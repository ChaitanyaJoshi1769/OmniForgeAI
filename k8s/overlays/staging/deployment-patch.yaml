apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniforge-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: LOG_LEVEL
              value: 'debug'
            - name: ENABLE_PROFILING
              value: 'true'
