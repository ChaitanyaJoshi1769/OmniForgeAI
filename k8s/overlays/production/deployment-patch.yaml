apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniforge-backend
spec:
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          env:
            - name: LOG_LEVEL
              value: 'warn'
            - name: ENABLE_PROFILING
              value: 'false'
            - name: RATE_LIMIT_ENABLED
              value: 'true'
