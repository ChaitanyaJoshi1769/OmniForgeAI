apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: omniforge-backend-policy
  namespace: omniforge-production
spec:
  podSelector:
    matchLabels:
      app: omniforge-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: omniforge-production
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: omniforge-production
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 27017
        - protocol: TCP
          port: 6379
    - to:
        - podSelector: {}
      ports:
        - protocol: UDP
          port: 53
