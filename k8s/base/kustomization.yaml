apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: omniforge

resources:
  - namespace.yaml
  - backend-deployment.yaml

commonLabels:
  app.kubernetes.io/name: omniforge
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  app.kubernetes.io/version: '0.0.1'
  app.kubernetes.io/documentation: 'https://github.com/ChaitanyaJoshi1769/OmniForgeAI'

replicas:
  - name: omniforge-backend
    count: 3

images:
  - name: ghcr.io/chaitanyajoshi1769/omniforge-ai
    newTag: latest
