version: '3.8'

services:
  # PostgreSQL for relational data
  postgres:
    image: postgres:16-alpine
    container_name: omniforge-postgres
    environment:
      POSTGRES_USER: omniforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-omniforge}
      POSTGRES_DB: omniforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omniforge']
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB for documents and flexible schemas
  mongodb:
    image: mongo:7-alpine
    container_name: omniforge-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: omniforge
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-omniforge}
      MONGO_INITDB_DATABASE: omniforge
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: omniforge-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch for full-text search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: omniforge-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant for vector search/embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: omniforge-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-omniforge}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6333/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: omniforge-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/minio/data
    command: minio server /minio/data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: omniforge-jaeger
    ports:
      - '16686:16686'
      - '14268:14268'
      - '14250:14250'
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:14269/']
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: omniforge-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 5

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: omniforge-grafana
    ports:
      - '3002:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # NATS for event streaming
  nats:
    image: nats:latest
    container_name: omniforge-nats
    ports:
      - '4222:4222'
      - '8222:8222'
    command: -js
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8222/healthz']
      interval: 10s
      timeout: 5s
      retries: 5

  # OmniForge Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: omniforge-backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://omniforge:${DB_PASSWORD:-omniforge}@postgres:5432/omniforge
      MONGODB_URI: mongodb://omniforge:${MONGO_PASSWORD:-omniforge}@mongodb:27017/omniforge
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      JAEGER_AGENT_HOST: jaeger
      JAEGER_AGENT_PORT: 6831
      NATS_SERVERS: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./libs:/app/libs
    command: npm run dev:backend

  # OmniForge Frontend
  frontend:
    image: node:20-alpine
    container_name: omniforge-frontend
    working_dir: /app
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - ./node_modules:/app/node_modules
    command: npm run dev:frontend

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: omniforge-network
